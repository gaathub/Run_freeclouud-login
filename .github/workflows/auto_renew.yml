name: 多账号自动登录续期任务

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖包
        run: |
          pip install seleniumbase ddddocr PyAutoGUI > init_env.log 2>&1

      - name: 🚀 智能解析节点并启动 Hysteria2
        env:
          proxy: ${{ secrets.PROXY }}
        run: |
          echo ">>> 正在下载 Hysteria2 客户端..."
          wget https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 || { echo "❌ 下载失败！"; exit 1; }
          chmod +x hysteria-linux-amd64
          
          echo ">>> 正在解析 PROXY 节点链接..."
          # 【修复：加上 || true 防止因为链接里少参数而导致脚本 1 秒闪退】
          AUTH=$(echo "$proxy" | sed -n 's|.*://\([^@]*\)@.*|\1|p' || true)
          SERVER=$(echo "$proxy" | sed -n 's|.*@\([^/?#]*\).*|\1|p' || true)
          SNI=$(echo "$proxy" | grep -oP 'sni=\K[^&#]*' || true)
          
          # 检查是不是根本没填密钥
          if [ -z "$SERVER" ]; then
            echo "❌ 严重错误：提取不到服务器地址！"
            echo "👉 请立刻去 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中，检查是否漏填了 PROXY 密钥！"
            exit 1
          fi
          
          echo "✅ 解析成功！正在生成配置文件..."
          echo "server: $SERVER" > hy2-config.yaml
          echo "auth: $AUTH" >> hy2-config.yaml
          echo "tls:" >> hy2-config.yaml
          echo "  sni: $SNI" >> hy2-config.yaml
          echo "  insecure: true" >> hy2-config.yaml
          echo "socks5:" >> hy2-config.yaml
          echo "  listen: 127.0.0.1:10808" >> hy2-config.yaml
          
          echo ">>> 启动代理客户端..."
          nohup ./hysteria-linux-amd64 client -c hy2-config.yaml > hy2.log 2>&1 &
          sleep 5

      - name: 运行自动化脚本 (全局接管网络 + 虚拟屏幕)
        env:
          acount: ${{ secrets.ACOUNT }}
          HTTP_PROXY: socks5://127.0.0.1:10808
          HTTPS_PROXY: socks5://127.0.0.1:10808
          NO_PROXY: localhost,127.0.0.1,::1
        run: |
          curl -x socks5://127.0.0.1:10808 -I https://www.baidu.com --connect-timeout 10 >> init_env.log 2>&1 || { 
            echo "❌ 代理连接失败！为您提取底层日志："; 
            echo "================ Hysteria2 运行日志 ================";
            cat hy2.log;
            echo "====================================================";
            exit 1; 
          }
          
          sudo apt-get update >> init_env.log 2>&1
          sudo apt-get install -y xvfb fonts-noto-cjk >> init_env.log 2>&1
          
          echo ">>> 🚀 开始执行自动登录 Python 脚本..."
          xvfb-run --server-args="-screen 0 1920x1080x24" python -u auto_login.py

      - name: 上传运行过程截图与日志文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Auto-Login-Results
          path: |
            screenshots/
            init_env.log
            hy2.log
          retention-days: 7
