name: 多账号自动登录续期任务

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（对应北京时间早上 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击按钮运行测试

jobs:
  run-script:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu Linux 系统作为后台服务器

    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖包
        run: |
          pip install seleniumbase ddddocr PyAutoGUI > init_env.log 2>&1

      - name: 🚀 智能解析节点并启动 Hysteria2
        env:
          proxy: ${{ secrets.PROXY }}
        run: |
          # 后台运行 Hysteria2 并将日志写入 hy2.log，这里不会产生乱糟糟的输出
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria-linux-amd64
          
          AUTH=$(echo "$proxy" | sed -n 's|.*://\([^@]*\)@.*|\1|p')
          SERVER=$(echo "$proxy" | sed -n 's|.*@\([^/?#]*\).*|\1|p')
          SNI=$(echo "$proxy" | grep -oP 'sni=\K[^&#]*')
          
          # 【修复1：使用 echo 逐行写入，彻底解决 YAML 格式罢工报错的问题】
          echo "server: $SERVER" > hy2-config.yaml
          echo "auth: $AUTH" >> hy2-config.yaml
          echo "tls:" >> hy2-config.yaml
          echo "  sni: $SNI" >> hy2-config.yaml
          echo "  insecure: true" >> hy2-config.yaml
          echo "socks5:" >> hy2-config.yaml
          echo "  listen: 127.0.0.1:10808" >> hy2-config.yaml
          
          nohup ./hysteria-linux-amd64 client -c hy2-config.yaml > hy2.log 2>&1 &
          sleep 5

      - name: 运行自动化脚本 (全局接管网络 + 虚拟屏幕)
        env:
          acount: ${{ secrets.ACOUNT }}
          # 【修复2：加回 HTTP_PROXY 环境变量，确保你的 Python 脚本能认出代理，不再“裸奔”被封 1005】
          HTTP_PROXY: socks5://127.0.0.1:10808
        run: |
          # 【修复3：国内节点无法测通 google，换成测 baidu，如果连不上代理就直接阻断任务】
          curl -x socks5://127.0.0.1:10808 -I https://www.baidu.com --connect-timeout 10 >> init_env.log 2>&1 || { echo "❌ 代理连接失败，立刻终止任务！"; exit 1; }
          
          # 安装环境：把 apt-get 长长的下载进度条全部静默，写进日志文件
          sudo apt-get update >> init_env.log 2>&1
          sudo apt-get install -y xvfb fonts-noto-cjk >> init_env.log 2>&1
          
          echo ">>> 🚀 开始执行自动登录 Python 脚本..."
          # 还原你原本的运行命令
          xvfb-run --server-args="-screen 0 1920x1080x24" python -u auto_login.py

      - name: 上传运行过程截图与日志文件
        uses: actions/upload-artifact@v4
        if: always() # 无论成功还是报错都执行
        with:
          name: Auto-Login-Results
          path: |
            screenshots/
            init_env.log
            hy2.log
          retention-days: 7
