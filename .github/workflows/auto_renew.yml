name: 多账号自动登录续期任务

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖包
        run: |
          pip install seleniumbase ddddocr PyAutoGUI > init_env.log 2>&1

      - name: 🚀 智能解析节点并启动代理核心 (全协议 + Base64 支持)
        env:
          PROXY_SECRET: ${{ secrets.PROXY }}
        run: |
          python3 - << 'EOF'
          import os, sys, urllib.parse, json, subprocess, time, base64
          
          secret = os.environ.get('PROXY_SECRET', '').strip()
          if not secret:
              print("❌ 严重错误：未获取到 PROXY 密钥！")
              sys.exit(1)
              
          print("=======================================================")
          print("🕵️‍♂️ 开始执行智能节点识别...")
          
          # === 🌟 核心升级：尝试 Base64 解码 ===
          try:
              # 尝试将其作为 Base64 解码
              decoded_bytes = base64.b64decode(secret)
              decoded_str = decoded_bytes.decode('utf-8').strip()
              # 如果解码后是 JSON 或 Hysteria 链接，说明用户传的是 Base64
              if decoded_str.startswith('{') or decoded_str.startswith('hysteria2://'):
                  secret = decoded_str
                  print("✅ 成功检测并解码 Base64 密钥！")
          except Exception:
              # 如果解码报错，说明用户传的本来就是明文，直接继续
              pass
          
          # 去除可能存在的 BOM 头 (针对 Windows 记事本)
          if secret.startswith('\ufeff'):
              secret = secret[1:]
          
          # ==========================================
          # 模式 1: 识别到 JSON (支持 Xray/v2ray 完整配置)
          # ==========================================
          if secret.startswith('{'):
              print("✅ 识别结果: Xray/v2ray JSON 完整配置")
              try:
                  # 校验 JSON 格式是否正确
                  json.loads(secret) 
                  with open('config.json', 'w', encoding='utf-8') as f:
                      f.write(secret)
                  
                  print(">>> 正在下载 Xray-core 内核...")
                  subprocess.run(["wget", "-q", "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip", "-O", "xray.zip"], check=True)
                  subprocess.run(["unzip", "-q", "xray.zip"], check=True)
                  subprocess.run(["chmod", "+x", "xray"], check=True)
                  
                  print(">>> 启动 Xray 代理客户端...")
                  subprocess.Popen(["./xray", "-c", "config.json"], stdout=open('proxy_engine.log', 'w'), stderr=subprocess.STDOUT)
              except Exception as e:
                  print(f"❌ JSON 解析或 Xray 启动失败: {e}")
                  sys.exit(1)
                  
          # ==========================================
          # 模式 2: 识别到 Hysteria2 单行链接
          # ==========================================
          elif secret.startswith('hysteria2://'):
              print("✅ 识别结果: Hysteria2 单行链接")
              try:
                  parsed = urllib.parse.urlparse(secret)
                  server = parsed.hostname
                  port = parsed.port
                  auth = parsed.username
                  qs = urllib.parse.parse_qs(parsed.query)
                  sni = qs.get('sni', [''])[0]
                  insecure = qs.get('insecure', ['1'])[0]
                  
                  yaml_str = f"""
                  server: {server}:{port}
                  auth: {auth}
                  tls:
                    sni: {sni}
                    insecure: {'true' if insecure in ['1', 'true', 'True'] else 'false'}
                  socks5:
                    listen: 127.0.0.1:10808
                  """
                  with open('hy2-config.yaml', 'w') as f: 
                      f.write(yaml_str.strip())
                      
                  print(">>> 正在下载 Hysteria2 内核...")
                  subprocess.run(["wget", "-q", "https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64", "-O", "hysteria"], check=True)
                  subprocess.run(["chmod", "+x", "hysteria"], check=True)
                  
                  print(">>> 启动 Hysteria2 代理客户端...")
                  subprocess.Popen(["./hysteria", "client", "-c", "hy2-config.yaml"], stdout=open('proxy_engine.log', 'w'), stderr=subprocess.STDOUT)
              except Exception as e:
                  print(f"❌ Hysteria2 链接解析失败: {e}")
                  sys.exit(1)
                  
          # ==========================================
          # 拦截模式: 残缺的单行链接
          # ==========================================
          elif secret.startswith('vless://') or secret.startswith('vmess://') or secret.startswith('trojan://'):
              print("❌ 错误：检测到 VLESS/VMess/Trojan 单行链接，缺少底层路由配置，Linux 无法直接运行。")
              sys.exit(1)
              
          else:
              print("❌ 无法识别的节点格式！")
              sys.exit(1)
          
          print("=======================================================")
          EOF
          
          echo ">>> 等待代理引擎初始化 (5秒)..."
          sleep 5
          
          echo ">>> 正在测试本地 SOCKS5 端口连通性 (127.0.0.1:10808)..."
          curl -x socks5://127.0.0.1:10808 -I https://www.baidu.com --connect-timeout 10 || { 
            echo "❌ 代理连接失败！为您提取代理内核报错日志："; 
            echo "================ 内核日志开始 ================";
            cat proxy_engine.log; 
            echo "================ 内核日志结束 ================";
            exit 1; 
          }
          echo "✅ 全局 SOCKS5 代理通道建立成功，可以开始自动化任务！"

      - name: 运行自动化脚本 (全局接管网络 + 虚拟屏幕)
        env:
          acount: ${{ secrets.ACOUNT }}
          HTTP_PROXY: socks5://127.0.0.1:10808
          HTTPS_PROXY: socks5://127.0.0.1:10808
          NO_PROXY: localhost,127.0.0.1,::1
        run: |
          sudo apt-get update >> init_env.log 2>&1
          sudo apt-get install -y xvfb fonts-noto-cjk >> init_env.log 2>&1
          
          echo ">>> 🚀 开始执行自动登录 Python 脚本..."
          xvfb-run --server-args="-screen 0 1920x1080x24" python -u auto_login.py

      - name: 上传运行过程截图与日志文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Auto-Login-Results
          path: |
            screenshots/
            init_env.log
            proxy_engine.log
          retention-days: 7
