name: 多账号自动登录续期任务

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖包
        run: |
          pip install seleniumbase ddddocr PyAutoGUI > init_env.log 2>&1

      - name: 🚀 智能解析节点并启动代理核心 (VLESS 链接直连版)
        env:
          PROXY_SECRET: ${{ secrets.PROXY }}
        run: |
          python3 - << 'EOF'
          import os, sys, urllib.parse, json, subprocess
          
          # 提取第一行，防止误填入多行订阅链接
          secret = os.environ.get('PROXY_SECRET', '').strip()
          if not secret:
              print("❌ 严重错误：未获取到 PROXY 密钥！")
              sys.exit(1)
          secret = secret.splitlines()[0].strip()
              
          print("=======================================================")
          print("🕵️‍♂️ 开始执行 vless:// 终极解析引擎...")
          
          # 预设最纯净的本地监听环境 (抛弃 v2rayN 乱七八糟的设置)
          config_dict = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 10808,
                  "protocol": "socks",
                  "settings": {"auth": "noauth", "udp": True}
              }],
              "outbounds": [{"protocol": "freedom", "tag": "direct"}]
          }
          
          if secret.startswith('vless://'):
              print("✅ 检测到 VLESS 单行链接，正在生成纯净配置...")
              parsed = urllib.parse.urlparse(secret)
              qs = urllib.parse.parse_qs(parsed.query)
              
              network = qs.get('type', ['tcp'])[0]
              security = qs.get('security', ['none'])[0]
              if security == '': security = 'none'
              
              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": parsed.hostname,
                          "port": int(parsed.port),
                          "users": [{"id": parsed.username, "encryption": qs.get('encryption', ['none'])[0]}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }
              
              # 处理 TLS 与 Reality 等高级加密
              if security == 'tls':
                  outbound['streamSettings']['tlsSettings'] = {
                      "sni": qs.get('sni', [parsed.hostname])[0],
                      "fingerprint": qs.get('fp', ['chrome'])[0]
                  }
                  if 'alpn' in qs:
                      outbound['streamSettings']['tlsSettings']['alpn'] = qs['alpn'][0].split(',')
              elif security == 'reality':
                  outbound['streamSettings']['realitySettings'] = {
                      "serverName": qs.get('sni', [parsed.hostname])[0],
                      "publicKey": qs.get('pbk', [''])[0],
                      "shortId": qs.get('sid', [''])[0],
                      "fingerprint": qs.get('fp', ['chrome'])[0],
                      "spiderX": qs.get('spx', ['/'])[0]
                  }
                  
              # 处理 WebSocket 与 GRPC 传输协议
              if network == 'ws':
                  outbound['streamSettings']['wsSettings'] = {
                      "path": qs.get('path', ['/'])[0],
                      "headers": {"Host": qs.get('host', [parsed.hostname])[0]}
                  }
              elif network == 'grpc':
                  outbound['streamSettings']['grpcSettings'] = {
                      "serviceName": qs.get('serviceName', [''])[0],
                      "multiMode": qs.get('mode', ['multi'])[0] == 'multi'
                  }
                  
              config_dict['outbounds'].insert(0, outbound)
          
          else:
              print("❌ 无法识别！请确保你在 GitHub Secrets 填入的是以 vless:// 开头的单行链接！")
              sys.exit(1)
          
          # 写入完美的 JSON 文件
          with open('config.json', 'w', encoding='utf-8') as f:
              json.dump(config_dict, f, indent=2)
          
          print(">>> 正在下载 Xray-core 内核...")
          subprocess.run(["wget", "-q", "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip", "-O", "xray.zip"], check=True)
          subprocess.run(["unzip", "-q", "-o", "xray.zip"], check=True)
          subprocess.run(["chmod", "+x", "xray"], check=True)
          
          print(">>> 启动 Xray 代理客户端...")
          subprocess.Popen(["./xray", "-c", "config.json"], stdout=open('proxy_engine.log', 'w'), stderr=subprocess.STDOUT)
          EOF
          
          echo ">>> 等待代理引擎初始化 (5秒)..."
          sleep 5
          
          echo ">>> 正在测试本地 SOCKS5 端口连通性 (127.0.0.1:10808)..."
          curl -x socks5://127.0.0.1:10808 -I https://www.baidu.com --connect-timeout 10 || { 
            echo "❌ 代理连接失败！为您提取代理内核报错日志："; 
            echo "================ 内核日志开始 ================";
            cat proxy_engine.log; 
            echo "================ 内核日志结束 ================";
            exit 1; 
          }
          echo "✅ 全局 SOCKS5 代理通道建立成功，可以开始自动化任务！"

      - name: 运行自动化脚本 (全局接管网络 + 虚拟屏幕)
        env:
          acount: ${{ secrets.ACOUNT }}
          HTTP_PROXY: socks5://127.0.0.1:10808
          HTTPS_PROXY: socks5://127.0.0.1:10808
          NO_PROXY: localhost,127.0.0.1,::1
        run: |
          sudo apt-get update >> init_env.log 2>&1
          sudo apt-get install -y xvfb fonts-noto-cjk >> init_env.log 2>&1
          
          echo ">>> 🚀 开始执行自动登录 Python 脚本..."
          xvfb-run --server-args="-screen 0 1920x1080x24" python -u auto_login.py

      - name: 上传运行过程截图与日志文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Auto-Login-Results
          path: |
            screenshots/
            init_env.log
            proxy_engine.log
          retention-days: 7
