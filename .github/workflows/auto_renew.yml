name: 多账号自动登录续期任务

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          pip install seleniumbase ddddocr
          
      - name: 运行自动化脚本
        env:
          acount: ${{ secrets.ACOUNT }}
        run: python -u auto_login.py

      - name: 上传运行过程截图 (Artifacts)
        uses: actions/upload-artifact@v4
        if: always() # 无论成功还是失败，都强行上传截图文件夹，方便排错
        with:
          name: Auto-Login-Screenshots
          path: screenshots/
          retention-days: 7 # 截图文件在 GitHub 服务器上保留 7 天
