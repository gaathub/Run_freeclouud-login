name: 多账号自动登录续期任务

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖包
        run: |
          pip install seleniumbase ddddocr

      - name: 🚀 智能解析节点并启动 Hysteria2
        env:
          # 读取你在 Secrets 中填入的完整 hy2 链接
          HY2_NODE: ${{ secrets.HY2_NODE }}
        run: |
          echo ">>> 正在下载 Hysteria2 内核..."
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria-linux-amd64
          
          echo ">>> 正在解析节点链接..."
          # 使用 sed 和 grep 提取完整链接中的密码、服务器地址和 SNI
          AUTH=$(echo "$HY2_NODE" | sed -n 's|.*://\([^@]*\)@.*|\1|p')
          SERVER=$(echo "$HY2_NODE" | sed -n 's|.*@\([^/?#]*\).*|\1|p')
          SNI=$(echo "$HY2_NODE" | grep -oP 'sni=\K[^&#]*')
          
          echo ">>> 提取成功！Server: $SERVER | SNI: $SNI"
          
          echo ">>> 正在生成本地代理配置..."
          cat <<EOF > hy2-config.yaml
          server: $SERVER
          auth: $AUTH
          tls:
            sni: $SNI
            insecure: true
          socks5:
            listen: 127.0.0.1:10808
          EOF
          
          echo ">>> 启动 Hysteria2 后台服务..."
          nohup ./hysteria-linux-amd64 client -c hy2-config.yaml > hy2.log 2>&1 &
          sleep 3
          
          # 打印一下启动日志，方便你在 GitHub 面板查看是否连接成功
          cat hy2.log

      - name: 运行自动化脚本 (全局接管网络)
        env:
          acount: ${{ secrets.ACOUNT }}
          # 强制 Python 和浏览器走刚才启动的本地 10808 端口
          HTTP_PROXY: socks5://127.0.0.1:10808
          HTTPS_PROXY: socks5://127.0.0.1:10808
        run: python -u auto_login.py

      - name: 上传运行过程截图
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: Auto-Login-Screenshots
          path: screenshots/
          retention-days: 7
